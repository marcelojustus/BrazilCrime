name: paper

on:
  push:
    branches:
      - joss-submission
  pull_request:

jobs:
  build-paper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build JOSS PDF
        uses: openjournals/openjournals-draft-action@master
        with:  
          journal: joss
          paper-path: paper/paper.md

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/*.pdf
